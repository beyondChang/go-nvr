# Go NVR Configuration
# Copy to go-nvr.yaml and customize for your setup
# Or use: ./go-nvr init --password <your-password>

server:
  listen: ":9090"

storage:
  root_dir: "/data"
  segment_duration: "30s"

# Authentication
# Option 1: Set password_hash (generate with: go-nvr hash-password <pw>)
# Option 2: Set password in plaintext (auto-converted to hash on first run)
auth:
  username: "admin"
  password_hash: ""  # Use `go-nvr hash-password <password>` to generate
  # password: ""      # Or set plaintext here (auto-hashed on first start)

# Camera configuration — add your cameras here
cameras: []
# Example cameras:
# cameras:
#   - id: "front-door"
#     name: "Front Door"
#     protocol: "rtsp"        # Transport: rtsp, http, onvif
#     encoding: "h264"         # Encoding: h264, h265, mjpeg, jpeg
#     url: "rtsp://192.168.1.100:554/stream"
#     enabled: true
#   - id: "backyard"
#     name: "Back Yard"
#     protocol: "http"
#     encoding: "jpeg"
#     url: "http://192.168.1.101/capture"
#     enabled: true

cleanup:
  retention_days: 30
  check_interval: "1h"
  disk_threshold_percent: 95

merge:
  enabled: false
  check_interval: "1h"
  window_size: "1h"
  batch_limit: 200
  min_segment_age: "10m"
  min_segments_to_merge: 3

ftp:
  enabled: true
  port: 2121
  passive_port_range: "2122-2140"

mqtt:
  enabled: false
  broker: "tcp://localhost:1883"
  topic: "gonr/trigger"
  client_id: "go-nvr"

webdav:
  enabled: true
  path_prefix: "/dav"
  read_write: false

hls:
  write_buffer_size: 40
  segment_max_size_mb: 10
