root = "."

[build]
  bin = "go-nvr.exe"
  cmd = "go build -o go-nvr.exe ."
  delay = 1000
  exclude_dir = ["data", "web", "android", ".atomcode", ".git"]
  exclude_file = []
  exclude_regex = [".*_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = ".\go-nvr.exe"
  include_ext = ["go", "tpl", "tmpl", "html"]
  kill_delay = "0s"
  log = "build-errors.log"
  send_interrupt = true
  stop_on_error = true

[color]
  app = "yellow"
  build = "green"
  main = "magenta"
  runner = "cyan"
  watcher = "blue"

[log]
  time = true

[screen]
  clear_on_rebuild = true
