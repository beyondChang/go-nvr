    <title>Go NVR</title>
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('mibee_nvr_prefs_theme');
          if (theme) {
            theme = JSON.parse(theme);
          }
          if (!theme) {
            theme = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
          }
          document.documentElement.setAttribute('data-theme', theme);
        } catch(e) {}
      })();
    </script>
